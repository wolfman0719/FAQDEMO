#
services:
  iris:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faqdemo
    hostname: iris
    command: --check-caps false
    ports:
    # superserver default port 
    - "51773:1972"
    # webserver/management portal port
    - "52773:52773"
    
    environment:
    - TZ=JST-9

# web gateway container
  webgateway:
    build:
      context: .
      dockerfile: Dockerfileweb
    init: true
    container_name: webgateway
    hostname: webgateway
    ports:
    - "8882:80"
    - "8883:443"
    environment:
    - ISC_DATA_DIRECTORY=/webgateway-shared/durable
    - ISC_CSP_CONF_FILE=/webgateway-shared/CSP.conf
    - ISC_CSP_INI_FILE=/webgateway-shared/CSP.ini
    volumes:
    - type: bind
      source: ./webgateway
      target: /webgateway-shared
